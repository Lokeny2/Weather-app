<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="weather-card">
        <div class="search-container">
            <input type="text" id="cityInput" placeholder="Enter city name..." spellcheck="false">
            <button id="searchBtn">Search</button>
        </div>

        <p class="error" id="errorMsg">City not found. Try again!</p>

        <div class="weather-info" id="weatherBox">
            <h2 class="city" id="cityName">--</h2>
            <div class="temp" id="tempValue">--°C</div>
            <p id="description">--</p>
            
            <div class="details">
                <div class="col">
                    <p>Humidity</p>
                    <strong id="humidity">--%</strong>
                </div>
                <div class="col">
                    <p>Wind Speed</p>
                    <strong id="windSpeed">-- km/h</strong>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
